<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeIQ AI</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  text-align: center;
  padding: 40px;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 100px;
}

button {
  margin-top: 15px;
  padding: 10px;
  background: green;
  color: white;
  border: none;
}

#result {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚀 CodeIQ AI</h2>

<textarea id="note" placeholder="Enter symptoms"></textarea><br>

<button onclick="send()">Generate</button>

<div id="result"></div>
</div>

<script>
async function send() {
  const note = document.getElementById("note").value.trim();
  const result = document.getElementById("result");

  if (!note) {
    alert("Enter symptoms");
    return;
  }

  result.innerText = "⏳ Loading...";

  try {
    const res = await fetch("/generate-codes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ note })
    });

    const data = await res.json();

    result.innerHTML = `
      ICD: ${data.icd}<br>
      CPT: ${data.cpt}<br>
      <small>${data.explanation}</small>
    `;

  } catch (err) {
    result.innerText = "❌ Error";
  }
}
</script>

</body>
</html>
